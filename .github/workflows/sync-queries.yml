# Biweekly queries.txt Sync Workflow
#
# Runs on the 1st and 15th of each month. Generates a new queries.txt via a KQL
# query, validates every query by executing it against Azure Resource Graph, and
# either creates a PR to upstream (microsoft/azure-retirement-impact-analyzer)
# with ONLY queries.txt changed, or opens an issue in this fork if validation fails.
#
# ─── Prerequisites ────────────────────────────────────────────────────────────
#
#   1. Azure AD App Registration with Workload Identity Federation (OIDC):
#      - Register an app in Azure AD.
#      - Add a federated credential for GitHub Actions:
#          Issuer:   https://token.actions.githubusercontent.com
#          Subject:  repo:<your-org>/<your-fork-repo>:ref:refs/heads/main
#          Audience: api://AzureADTokenExchange
#      - Grant the app "Reader" role on the subscriptions you want to query.
#      - Grant the app "Viewer" permission on the Kusto cluster
#        (https://azsrcludev.eastus.kusto.windows.net) so it can run
#        queries against the ServiceRetirements database.
#
#   2. GitHub Repository Secrets (set in your fork):
#      - AZURE_CLIENT_ID      — App Registration client/application ID
#      - AZURE_TENANT_ID      — Azure AD tenant ID
#      - AZURE_SUBSCRIPTION_ID — Default subscription for az graph queries
#
#   3. Optional repository variable (Settings → Secrets and variables → Variables):
#      - NOTIFY_USERS — comma-separated GitHub usernames to @mention in validation
#        failure issues (e.g. "user1,user2"). If not set, no @mentions are added.
#
#   4. Fork must have Actions enabled and "Allow all actions" (or at least the
#      actions referenced below) in Settings → Actions → General.
#
#   5. The GITHUB_TOKEN needs permission to create PRs on the upstream repo.
#      GitHub grants this automatically for public fork → upstream PRs.
# ──────────────────────────────────────────────────────────────────────────────

name: Sync queries.txt

on:
  schedule:
    # 1st and 15th of every month at 08:00 UTC
    - cron: '0 8 1,15 * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pull-requests: write
  issues: write

env:
  UPSTREAM_REPO: microsoft/azure-retirement-impact-analyzer
  UPSTREAM_BRANCH: main
  QUERIES_FILE: Impact-Analyzer/queries.txt
  KUSTO_CLUSTER: https://azsrcludev.eastus.kusto.windows.net
  KUSTO_DATABASE: ServiceRetirements

jobs:
  update-and-validate:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout the fork ──────────────────────────────────────────────
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Azure Login (OIDC) ─────────────────────────────────────────────
      - name: Azure Login
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          # Get OIDC token from GitHub
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | jq -r '.value')

          # Login to Azure using federated credential
          az login --service-principal \
            -u "${AZURE_CLIENT_ID}" \
            -t "${AZURE_TENANT_ID}" \
            --federated-token "${OIDC_TOKEN}" \
            --output none

          az account set -s "${AZURE_SUBSCRIPTION_ID}"

      # ── 3. Install Azure Resource Graph extension ──────────────────────────
      - name: Install az resource-graph extension
        run: |
          az extension add -n resource-graph --only-show-errors 2>/dev/null || true
          az config set extension.dynamic_install_allow_preview=true --only-show-errors 2>/dev/null || true

      # ── 4. Generate queries.txt from Kusto ──────────────────────────────────
      # Queries the ARGQueries table in the ServiceRetirements database on the
      # azsrcludev Kusto cluster and writes one query per line to queries.txt.
      - name: Generate queries.txt
        run: |
          # Get a token scoped to the Kusto cluster
          TOKEN=$(az account get-access-token \
            --resource "${{ env.KUSTO_CLUSTER }}" \
            --query accessToken -o tsv)

          # Query the Kusto REST API
          RESPONSE=$(curl -sf \
            -X POST "${{ env.KUSTO_CLUSTER }}/v1/rest/query" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"db":"${{ env.KUSTO_DATABASE }}","csl":"ARGQueries | project Query"}')

          if [ -z "$RESPONSE" ]; then
            echo "::error::Kusto query returned empty response"
            exit 1
          fi

          # Extract the Query column values (one per line) from the Kusto response
          echo "$RESPONSE" | jq -r '.Tables[0].Rows[] | .[0]' > "${{ env.QUERIES_FILE }}"

          QUERY_COUNT=$(wc -l < "${{ env.QUERIES_FILE }}")
          if [ "$QUERY_COUNT" -eq 0 ]; then
            echo "::error::Kusto query returned 0 rows — queries.txt would be empty"
            exit 1
          fi

          echo "Generated queries.txt with ${QUERY_COUNT} queries."

      # ── 5. Check if queries.txt actually changed ───────────────────────────
      - name: Check for changes
        id: check
        run: |
          if git diff --quiet "${{ env.QUERIES_FILE }}"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::queries.txt is unchanged — nothing to do."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "queries.txt has changed — proceeding to validation."
          fi

      # ── 6. Validate every query in queries.txt ────────────────────────────
      - name: Validate queries
        id: validate
        if: steps.check.outputs.changed == 'true'
        shell: pwsh
        run: |
          try {
            & ./Impact-Analyzer/validate-queries.ps1
            echo "validation_failed=false" >> $env:GITHUB_OUTPUT
          }
          catch {
            echo "validation_failed=true" >> $env:GITHUB_OUTPUT
          }
          # Also check exit code from the script
          if ($LASTEXITCODE -ne 0) {
            echo "validation_failed=true" >> $env:GITHUB_OUTPUT
          }

      # ── 7. On failure → Create issue in the fork ──────────────────────────
      - name: Create issue on validation failure
        if: steps.validate.outputs.validation_failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)

          # Build issue body from failure details
          BODY="## queries.txt Validation Failed — ${DATE}\n\n"
          BODY+="The automated biweekly update of \`queries.txt\` failed validation.\n"
          BODY+="One or more Azure Resource Graph queries did not execute successfully.\n\n"

          if [ -f "Impact-Analyzer/validation-failures.json" ]; then
            BODY+="### Failure Details\n\n"
            BODY+="\`\`\`json\n"
            BODY+="$(cat Impact-Analyzer/validation-failures.json)\n"
            BODY+="\`\`\`\n\n"
          fi

          BODY+="### Next Steps\n\n"
          BODY+="1. Review the failed queries above.\n"
          BODY+="2. Fix the KQL generation logic or the queries themselves.\n"
          BODY+="3. Re-run the workflow manually via **Actions → Sync queries.txt → Run workflow**.\n"

          # @mention configured users if NOTIFY_USERS variable is set
          if [ -n "${{ vars.NOTIFY_USERS }}" ]; then
            MENTIONS=$(echo "${{ vars.NOTIFY_USERS }}" | tr ',' '\n' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//' | sed 's/^/@/' | tr '\n' ' ')
            BODY+="\n---\ncc ${MENTIONS}\n"
          fi

          # Check for existing open issue to avoid duplicates
          EXISTING=$(gh issue list --state open --label "queries-validation-failure" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Updating existing issue #${EXISTING}"
            gh issue comment "$EXISTING" --body "$(echo -e "$BODY")"
          else
            echo "Creating new issue"
            gh issue create \
              --title "queries.txt validation failed — ${DATE}" \
              --body "$(echo -e "$BODY")" \
              --label "queries-validation-failure"
          fi

      # ── 8. On success → Push branch and create PR to upstream ──────────────
      - name: Check for existing open PR
        id: existing_pr
        if: steps.check.outputs.changed == 'true' && steps.validate.outputs.validation_failed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Skip if there's already an open PR from this fork updating queries.txt
          OPEN_PR=$(gh pr list \
            --repo "${{ env.UPSTREAM_REPO }}" \
            --state open \
            --author "@me" \
            --search "Update queries.txt" \
            --json number \
            --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$OPEN_PR" ]; then
            echo "pr_exists=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$OPEN_PR" >> "$GITHUB_OUTPUT"
            echo "::notice::Open PR #${OPEN_PR} already exists — skipping PR creation."
          else
            echo "pr_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branch and create PR
        if: >-
          steps.check.outputs.changed == 'true' &&
          steps.validate.outputs.validation_failed != 'true' &&
          steps.existing_pr.outputs.pr_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="update-queries-${DATE}"
          FORK_OWNER="${{ github.repository_owner }}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch, stage ONLY queries.txt, commit, and push
          git checkout -b "$BRANCH"
          git add "${{ env.QUERIES_FILE }}"
          git commit -m "Update queries.txt — ${DATE}"
          git push origin "$BRANCH"

          # Create PR targeting upstream
          gh pr create \
            --repo "${{ env.UPSTREAM_REPO }}" \
            --base "${{ env.UPSTREAM_BRANCH }}" \
            --head "${FORK_OWNER}:${BRANCH}" \
            --title "Update queries.txt — ${DATE}" \
            --body "## Automated queries.txt Update

          This PR was created automatically by the biweekly update workflow.

          ### What changed
          - Updated \`Impact-Analyzer/queries.txt\` with the latest Azure retirement queries.

          ### Validation
          All queries were validated by executing them against Azure Resource Graph.
          Every query ran successfully without errors.

          ---
          *Generated by [Sync queries.txt](https://github.com/${FORK_OWNER}/${{ github.event.repository.name }}/actions/workflows/sync-queries.yml) workflow on ${DATE}.*"

      # ── 9. Fail the workflow run if validation failed ──────────────────────
      - name: Fail workflow on validation failure
        if: steps.validate.outputs.validation_failed == 'true'
        run: |
          echo "::error::Validation failed — see issue created above for details."
          exit 1
